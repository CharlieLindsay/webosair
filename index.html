<!DOCTYPE html>
<html>

<head>
    <style>
        html,
        body {
            height: 100%;
            margin: 0;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }
    </style>
    <title>WebOS Air</title>
    <link rel="icon" type="image/x-icon" href="images/webosair_logo.png">
</head>

<body
    style="background-image:url(images/steve001-airbus-4454338.jpg);background-size:cover;background-repeat:no-repeat;background-position:center;background-attachment:fixed;">
    <div
        style="display:flex;justify-content:space-between;backdrop-filter: blur(5px); background-color: rgba(0, 94, 255, 0.25); color: #fff; justify-content: space-between;">
        <p style="margin:5px 20px 5px 20px;background-color:rgb(81, 154, 232);border-radius:20px;padding:4px;">WebOS Air
        </p>
        <img src="images/webosair_logo.png" width="30px" height="30px">
        <p style="margin:5px 20px 5px 20px;background-color:rgb(81, 154, 232);border-radius:20px;padding:4px;"
            id="timeElement">00:00:00</p>
    </div>


    <div style="background-color:#0006ab;color:white;opacity:70%;border:solid;padding:10px;position:absolute;border-radius:10px;width:40%;top:50%;left:50%;transform:translate(-50%, -50%);"
        id="welcome">
        <div style="width:100%;background-color:rgb(78, 63, 243);opacity:70%;margin:0;border-radius:20px;cursor:pointer;height:20px;"
            id="welcomeheader">
            <p style="cursor: pointer;">
            <div id="welcomeclose" style="background-color:red;border-radius:20px;width:20px;height:20px;margin-top:0;">
            </div>
            </p>
        </div>
        <h1>WebOS Air</h1>
        <h2>A web-based operating system designed by Charlie Lindsay designed for aviation enthusiests!</h2>
        <p>I hope you enjoy the site!</p>
    </div>

    <div
        style="display:flex;justify-content:center;backdrop-filter: blur(5px); background-color: rgba(0, 94, 255, 0.25);width:50%;color:#fff;position:fixed;bottom:2%;left:25%;border-radius:20px;">
        <p style="margin:5px 20px 5px 20px;background-color:rgb(81, 154, 232);border-radius:20px;padding:4px;cursor:pointer;"
            id="welcomeopen">WebOS Air</p>
    </div>
    <script src="script.js"></script>
</body>

</html>
